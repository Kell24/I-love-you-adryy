<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Adry</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; height: 100vh; width: 100vw; }
        canvas { display: block; }
        .foto-canto {
            position: absolute;
            width: 110px;
            height: 110px;
            object-fit: cover;
            border: 2px solid #FF1493;
            border-radius: 10px;
            box-shadow: 0 0 10px #FF1493;
            z-index: 10;
        }
        .topo-esquerda { top: 15px; left: 15px; transform: rotate(-5deg); }
        .topo-direita { top: 15px; right: 15px; transform: rotate(5deg); }
        .baixo-esquerda { bottom: 15px; left: 15px; transform: rotate(5deg); }
        .baixo-direita { bottom: 15px; right: 15px; transform: rotate(-5deg); }
    </style>
</head>
<body>

    <img src="20251129_215433.jpg" class="foto-canto topo-esquerda">
    <img src="Screenshot_20250923_143516_Photos.jpg" class="foto-canto topo-direita">
    <img src="IMG_20250906_163721_402.webp" class="foto-canto baixo-esquerda">
    <img src="IMG_20250829-WA0039.jpg" class="foto-canto baixo-direita">

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const words = "ADRY";
        const particles = [];
        const particleCount = 80; 

        class Particle {
            constructor(angle) {
                this.angle = angle;
                this.speed = 0.005;
                this.size = 16;
            }
            update() { this.angle += this.speed; }
            draw() {
                const x = 16 * Math.pow(Math.sin(this.angle), 3);
                const y = -(13 * Math.cos(this.angle) - 5 * Math.cos(2 * this.angle) - 2 * Math.cos(3 * this.angle) - Math.cos(4 * this.angle));
                const scale = window.innerWidth < 600 ? 10 : 15; 
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                ctx.fillStyle = "#FF1493";
                ctx.font = `bold ${this.size}px Arial`;
                const posX = centerX + x * scale;
                const posY = centerY + y * scale;
                ctx.fillText(words, posX, posY);
            }
        }

        function init() { for (let i = 0; i < particleCount; i++) { particles.push(new Particle(i * (Math.PI * 2 / particleCount))); } }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
