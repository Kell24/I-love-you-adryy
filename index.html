<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Adry</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; height: 100vh; width: 100vw; }
        canvas { display: block; z-index: 1; }
        .foto-canto {
            position: absolute;
            width: 100px;
            height: 100px;
            object-fit: cover;
            border: 2px solid #FF1493;
            border-radius: 10px;
            box-shadow: 0 0 10px #FF1493;
            z-index: 10;
        }
        .topo-esquerda { top: 10px; left: 10px; transform: rotate(-5deg); }
        .topo-direita { top: 10px; right: 10px; transform: rotate(5deg); }
        .baixo-esquerda { bottom: 10px; left: 10px; transform: rotate(5deg); }
        .baixo-direita { bottom: 10px; right: 10px; transform: rotate(-5deg); }
    </style>
</head>
<body>

    <img src="20251129_215433.jpg" class="foto-canto topo-esquerda">
    <img src="Screenshot_20250923_143516_Photos.jpg" class="foto-canto topo-direita">
    <img src="IMG_20250906_163721_402.webp" class="foto-canto baixo-esquerda">
    <img src="IMG_20250829-WA0039.jpg" class="foto-canto baixo-direita">

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- NOME DA FOTO CENTRAL QUE VOCÊ ACABOU DE ADD ---
        const centralImage = new Image();
        centralImage.src = 'Screenshot_20240909_113645_InstaPro.jpg';

        const words = "I LOVE YOU ADRYY"; 
        const particles = [];
        const particleCount = 60; 

        function drawHeartShape(centerX, centerY, scale) {
            ctx.beginPath();
            for (let angle = 0; angle < Math.PI * 2; angle += 0.01) {
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                ctx.lineTo(centerX + x * scale, centerY + y * scale);
            }
            ctx.closePath();
        }

        class Particle {
            constructor(angle) {
                this.angle = angle;
                this.speed = 0.003;
                this.size = 13; 
            }
            update() { this.angle += this.speed; }
            draw() {
                const x = 16 * Math.pow(Math.sin(this.angle), 3);
                const y = -(13 * Math.cos(this.angle) - 5 * Math.cos(2 * this.angle) - 2 * Math.cos(3 * this.angle) - Math.cos(4 * this.angle));
                const scale = window.innerWidth < 600 ? 8 : 13; 
                ctx.fillStyle = "#FF1493";
                ctx.font = `bold ${this.size}px Arial`;
                ctx.fillText(words, (canvas.width / 2) + x * scale, (canvas.height / 2) + y * scale);
            }
        }

        function init() { for (let i = 0; i < particleCount; i++) { particles.push(new Particle(i * (Math.PI * 2 / particleCount))); } }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const scaleCentral = window.innerWidth < 600 ? 5 : 8;

            if (centralImage.complete) {
                ctx.save();
                drawHeartShape(canvas.width / 2, canvas.height / 2, scaleCentral);
                ctx.clip();
                ctx.drawImage(centralImage, (canvas.width / 2) - 100, (canvas.height / 2) - 100, 200, 200);
                ctx.restore();
                ctx.strokeStyle = '#FF1493';
                ctx.lineWidth = 2;
                drawHeartShape(canvas.width / 2, canvas.height / 2, scaleCentral);
                ctx.stroke();
            }

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
